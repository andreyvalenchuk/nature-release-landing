    .l-lang { display: flex; align-items: center; gap: 4px; height: 34px; padding: 0 12px; border-radius: 100px; border: 1px solid rgba(255,255,255,0.15); background: transparent; cursor: pointer; transition: border-color 0.2s, background 0.2s; font-family: 'Inter', sans-serif; }

    .l-title { font-size: 48px; font-weight: 700; letter-spacing: -0.03em; line-height: 1.1; color: var(--white); margin-bottom: 16px; }
    .l-updated { font-size: 13px; color: var(--light-grey); margin-bottom: 32px; }
    .l-intro { font-size: 16px; line-height: 1.7; color: var(--light-grey); padding-bottom: 48px; border-bottom: 1px solid var(--grey); }

    .l-section-body { font-size: 15px; line-height: 1.75; color: #aaaaaa; }
    .l-section-body p { margin-bottom: 12px; }
    .l-section-body p:last-child { margin-bottom: 0; }
    .l-section-body ul { list-style: none; margin: 8px 0 12px; display: flex; flex-direction: column; gap: 6px; }
    .l-section-body ul li::before { content: "→"; color: var(--purple); font-weight: 700; margin-right: 8px; }
    .l-section-body strong { color: var(--white); font-weight: 600; }
    .l-section-body a { color: var(--purple); text-decoration: none; border-bottom: 1px solid rgba(178,134,253,0.3); }
