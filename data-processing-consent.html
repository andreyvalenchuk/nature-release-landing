    document.getElementById('docTitle').textContent = d.title;
    document.getElementById('docUpdated').textContent = d.updated;
    document.getElementById('docIntro').textContent = d.intro;
    document.getElementById('backLink').textContent = d.back;
    document.getElementById('langLabel').textContent = l;
    document.getElementById('footerCopy').textContent = d.copy;
    document.getElementById('linkPrivacy').textContent = d.linkPrivacy;
    document.getElementById('linkTerms').textContent = d.linkTerms;
    document.getElementById('linkConsent').textContent = d.linkConsent;

    const container = document.getElementById('docSections');
    container.innerHTML = d.sections.map(s => `
      <div class="l-section">
        <div class="l-section-num">${s.num}</div>
        <div class="l-section-title">${s.title}</div>
        <div class="l-section-body">${s.html}</div>
      </div>`).join('');

    localStorage.setItem('nr-lang', l);
  }

  document.getElementById('langToggle').addEventListener('click', () => {
    render(lang === 'EN' ? 'RU' : 'EN');
  });

  render(lang);
</script>
</body>
</html>
